<HTML>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆相关知识小测验</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .quiz-title {
            text-align: center;
            color: #3f51b5;
            margin-bottom: 20px;
        }
        
        .question {
            background-color: #e8eaf6;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            background-color: #f8bbd0;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            text-align: left;
        }
        
        .feedback {
            margin-top: 10px;
            font-weight: bold;
        }
        
        .correct {
            color: #4caf50;
        }
        
        .incorrect {
            color: #f44336;
        }
        
        button {
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            background-color: #303f9f;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1 class="quiz-title">圆相关知识小测验</h1>
        
        <!-- 问题1 -->
        <div class="question">
            <p>1. 圆的周长公式是：</p>
            <div class="options">
                <label class="option"><input type="radio" name="q1" value="A"> A. C = πr²</label><br>
                <label class="option"><input type="radio" name="q1" value="B"> B. C = 2πr</label><br>
                <label class="option"><input type="radio" name="q1" value="C"> C. C = πd/4</label><br>
                <label class="option"><input type="radio" name="q1" value="D"> D. 没有正确选项</label>
            </div>
            <div id="feedback-1" class="feedback"></div>
        </div>
        
        <!-- 问题2 -->
        <div class="question">
            <p>2. 在圆中，所有点到圆心的距离：</p>
            <div class="options">
                <label class="option"><input type="radio" name="q2" value="A"> A. 相等</label><br>
                <label class="option"><input type="radio" name="q2" value="B"> B. 不相等</label><br>
                <label class="option"><input type="radio" name="q2" value="C"> C. 取决于位置</label><br>
                <label class="option"><input type="radio" name="q2" value="D"> D. 最大处相等，最小处不等</label>
            </div>
            <div id="feedback-2" class="feedback"></div>
        </div>
        
        <!-- 问题3 -->
        <div class="question">
            <p>3. 圆的直径与其半径的关系是：</p>
            <div class="options">
                <label class="option"><input type="radio" name="q3" value="A"> A. 直径 = 半径 × π</label><br>
                <label class="option"><input type="radio" name="q3" value="B"> B. 直径 = 2 × 半径</label><br>
                <label class="option"><input type="radio" name="q3" value="C"> C. 直径和半径没有关系</label><br>
                <label class="option"><input type="radio" name="q3" value="D"> D. 直径 = 半径 × 2/π</label>
            </div>
            <div id="feedback-3" class="feedback"></div>
        </div>
        
        <!-- 问题4 -->
        <div class="question">
            <p>4. 圆的面积公式是：</p>
            <div class="options">
                <label class="option"><input type="radio" name="q4" value="A"> A. A = πr²</label><br>
                <label class="option"><input type="radio" name="q4" value="B"> B. A = 2πr²</label><br>
                <label class="option"><input type="radio" name="q4" value="C"> C. A = πd²/4</label><br>
                <label class="option"><input type="radio" name="q4" value="D"> D. 没有正确选项</label>
            </div>
            <div id="feedback-4" class="feedback"></div>
        </div>
        
        <!-- 问题5 -->
        <div class="question">
            <p>5. 圆的周长与其直径的关系是：</p>
            <div class="options">
                <label class="option"><input type="radio" name="q5" value="A"> A. C = πd</label><br>
                <label class="option"><input type="radio" name="q5" value="B"> B. C = d/π</label><br>
                <label class="option"><input type="radio" name="q5" value="C"> C. C = 2d × π</label><br>
                <label class="option"><input type="radio" name="q5" value="D"> D. 没有正确选项</label>
            </div>
            <div id="feedback-5" class="feedback"></div>
        </div>
        
        <!-- 提交按钮 -->
        <button class="submit-btn" onclick="checkAnswers()">提交答案</button>
    </div>

    <script>
        function checkAnswers() {
            // 获取所有选择的答案
            const q1 = document.querySelector('input[name="q1"]:checked').value;
            const q2 = document.querySelector('input[name="q2"]:checked')?.value || '';
            const q3 = document.querySelector('input[name="q5"]的人工智能')?.value || '';
            
            // 问题反馈元素
            const feedbacks = [
                document.getElementById("feedback-1"),
                document.getElementById("feedback-2"),
                document.getElementById("feedback-3"),
                document.getElementById("feedback-4"),
                document.getElementById("feedback-5")
            ];
            
            // 清空之前反馈
            for (let i = 0; i < feedbacks.length; i++) {
                if (!feedbacks[i].textContent.includes('正确') && !feedbacks[i].textContent.includes('错误')) {
                    feedbacks[i].innerHTML = "";
                }
            }
            
            // 检查答案并显示反馈
            const answers = [
                {q: "C = 2πr", correct: true, text: "B. C = 2πr"},
                {q: "所有点距离相等", correct: true, text: "A. 相等"},
                {q: "直径 = 半径 × π", correct: false, text: "B. 直径 = 2 × 半径"},
                {q: "πd²/4", correct: true, text: "C. A = πr²"},
                {q: "C = πd", correct: true, text: "A. C = πd"}
            ];
            
            // 验证问题1
            if (q1 === 'B') {
                feedbacks[0].innerHTML = "<span class='correct'>✓ 正确!</span>";
                feedbacks[0].style.color = "#4caf50";
            } else if (q1 !== '') {
                feedbacks[0].innerHTML = "<span class='incorrect'>✕ 错误，正确答案是B</span>";
                feedbacks[0].style.color = "#f44336";
            }
            
            // 验证问题2
            const q2Answer = document.querySelector('input[name="q2"]:checked').value;
            if (q2Answer === 'A') {
                feedbacks[1].innerHTML = "<span class='correct'>✓ 正确!</span>";
                feedbacks[1].style.color = "#4caf50";
            } else if (q2 !== '') {
                feedbacks[1].innerHTML = "<span class='incorrect'>✕ 错误，正确答案是A</span>";
                feedbacks[1].style.color = "#f44336";
            }
            
            // 验证问题3
            const q3Answer = document.querySelector('input[name="q3"]:checked')?.value;
            if (q3Answer === 'B') {
                feedbacks[2].innerHTML = "<span class='correct'>✓ 正确!</span>";
                feedbacks[2].style.color = "#4caf50";
            } else if (q3 !== '') {
                feedbacks[2].innerHTML = "<span class='incorrect'>✕ 错误，正确答案是B</span>";
                feedbacks[2].style.color = "#f44336";
            }
            
            // 验证问题4
            const q4Answer = document.querySelector('input[name="q4"]:checked')?.value;
            if (q4Answer === 'C') {
                feedbacks[3].innerHTML = "<span class='correct'>✓ 正确!</span>";
                feedbacks[3].style.color = "#4caf50";
            } else if (q4 !== '') {
                feedbacks[3].innerHTML = "<span class='incorrect'>✕ 错误，正确答案是C</span>";
                feedbacks[3].style.color = "#f44336";
            }
            
            // 验证问题5
            const q5Answer = document.querySelector('input[name="q5"]:checked')?.value;
            if (q5Answer === 'A') {
                feedbacks[4].innerHTML = "<span class='correct'>✓ 正确!</span>";
                feedbacks[4].style.color = "#4caf50";
            } else if (q5 !== '') {
                feedbacks[4].innerHTML = "<span class='incorrect'>✕ 错误，正确答案是A</span>";
                feedbacks[4].style.color = "#f44336";
            }
        }

        // 提交按钮
        <button onclick="checkAnswers()">提交测验</button>
    </body>
    </html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arc Challenge · 弧角挑战赛 | 圆周角定理互动游戏</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1e4b3c 0%, #0a2e25 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Noto Sans', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            transition: font-size 0.1s ease;
        }

        /* 游戏主卡片 */
        .game-container {
            max-width: 1100px;
            width: 100%;
            background: #fef7e8;
            border-radius: 72px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4), inset 0 1px 3px rgba(255,255,240,0.8);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 头部信息 */
        .game-header {
            background: #ffaa44;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 4px solid #e67e22;
        }

        .target-box {
            background: #2c3e2f;
            border-radius: 60px;
            padding: 6px 20px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 -2px 0 #1e2a1f, 0 5px 12px rgba(0,0,0,0.2);
        }

        .target-box span {
            font-size: 1.8rem;
            color: #ffbc6e;
            margin-right: 6px;
        }

        .score-board {
            background: #5e3a1c;
            border-radius: 60px;
            padding: 6px 20px;
            font-weight: bold;
            color: #ffdca8;
            font-size: 1rem;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .score-board div strong {
            color: #ffcc77;
            font-size: 1.4rem;
            margin-right: 5px;
        }

        /* 控制栏 (语言+字体) */
        .control-bar {
            background: #fae8c8;
            padding: 8px 28px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            border-bottom: 1px solid #eeddbb;
            flex-wrap: wrap;
        }

        .ctrl-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #fff3e0;
            padding: 4px 16px;
            border-radius: 40px;
        }

        .ctrl-group label {
            font-weight: bold;
            font-size: 0.8rem;
            color: #5a3e1b;
        }

        select, .font-btn {
            background: #ffdd99;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        .font-btn {
            background: #e0aa6e;
            color: white;
            margin: 0 2px;
        }

        /* canvas 区域 */
        .canvas-area {
            display: flex;
            justify-content: center;
            padding: 20px 30px 10px 30px;
        }

        canvas {
            background: #fcf9ef;
            border-radius: 48px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            height: auto;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            cursor: crosshair;
            border: 4px solid #e0bc7c;
        }

        /* 信息面板 */
        .info-panel {
            background: #ebddb0;
            margin: 5px 30px 20px 30px;
            border-radius: 48px;
            padding: 12px 22px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            font-weight: bold;
        }

        .angle-result, .timer-box {
            background: #fff3df;
            padding: 6px 18px;
            border-radius: 40px;
            color: #704214;
        }

        .timer-box {
            background: #f5e2c1;
            font-family: monospace;
        }

        .timer-box strong {
            color: #c24400;
            font-size: 1.4rem;
        }

        /* 按钮区域 */
        .action-bar {
            background: #fff0da;
            margin: 0px 30px 25px 30px;
            border-radius: 48px;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        button {
            background: #bc6c25;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        button:hover {
            background: #9c5518;
            transform: scale(0.96);
        }

        .clear-btn {
            background: #3c6e71;
        }

        .next-btn {
            background: #e67e22;
        }

        .feedback {
            background: #e8f0e3;
            padding: 8px 18px;
            border-radius: 60px;
            flex: 2;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2d5a2c;
        }

        .rule-tip {
            text-align: center;
            font-size: 0.7rem;
            padding: 10px;
            color: #9c7e4c;
            background: #fff4e4;
            border-top: 1px solid #eeddbb;
        }

        @media (max-width: 700px) {
            .game-header { padding: 12px 20px; }
            .control-bar { padding: 6px 20px; }
            .info-panel { margin: 5px 20px 15px 20px; }
            .action-bar { margin: 0px 20px 20px 20px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="control-bar">
        <div class="ctrl-group">
            <label id="langLabel">🌐 语言</label>
            <select id="langSelect">
                <option value="zh">中文</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label id="fontLabel">🔤 字体大小</label>
            <button class="font-btn" id="fontMinus">A-</button>
            <button class="font-btn" id="fontPlus">A+</button>
        </div>
    </div>

    <div class="game-header">
        <div class="target-box">
            <span id="targetIcon">🎯</span> <span id="targetLabel">目标圆周角</span> <span id="targetAngle">45.0</span>°
        </div>
        <div class="score-board">
            <div>🏆 <strong id="totalScore">0</strong> <span id="totalLabel">总分</span></div>
            <div>✨ <strong id="roundScore">0</strong> <span id="roundLabel">本轮得分</span></div>
        </div>
    </div>

    <div class="canvas-area">
        <canvas id="circleCanvas" width="600" height="600"></canvas>
    </div>

    <div class="info-panel">
        <div class="angle-result">
            <span id="arcLabel">📐 弦所对劣弧圆周角</span> = <strong id="computedAngle">—</strong> °
        </div>
        <div class="timer-box">
            ⏱️ <span id="timerLabel">剩余时间</span> : <strong id="timerSeconds">15</strong> s
        </div>
    </div>

    <div class="action-bar">
        <div class="feedback" id="feedbackMsg">💡 点击圆上两点，确定弦 → 自动计算劣弧圆周角，与目标对比得分！</div>
        <button class="clear-btn" id="clearPointsBtn">🗑️ <span id="clearBtnText">清除点</span></button>
        <button class="next-btn" id="nextRoundBtn">✨ <span id="nextBtnText">下一题 & 累计总分</span></button>
    </div>
    <div class="rule-tip" id="ruleText">
        📖 圆周角定理：同弧所对圆周角 = 圆心角的一半。弦分圆为两弧，取劣弧上的圆周角 (0°~90°)。目标角度0°~90°，你的弦得到的劣弧圆周角越接近目标，得分越高！(满分100，差值每1°扣2分)
    </div>
</div>

<script>
    (function(){
        // ---------- DOM 元素 ----------
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 600;

        // 圆几何参数
        const center = { x: 300, y: 300 };
        const radius = 220;

        // 游戏核心状态
        let targetAngle = 45.0;            // 目标角度 0~90
        let totalPoints = 0;               // 累计总分
        let currentRoundScore = 0;         // 当前弦得分
        let pointA = null;
        let pointB = null;
        let lastComputedArcAngle = null;    // 最新劣弧圆周角
        
        // 倒计时相关
        let timerInterval = null;
        let timeLeft = 15;                  // 每轮15秒
        let isAnswered = false;             // 本轮是否已经作答（得分后禁止重复作答）
        let roundActive = true;             // 是否激活作答（倒计时未结束且未作答）
        
        // 语言配置
        let currentLang = 'zh';
        const translations = {
            zh: {
                targetLabel: '目标圆周角', totalLabel: '总分', roundLabel: '本轮得分',
                arcLabel: '📐 弦所对劣弧圆周角', timerLabel: '剩余时间', clearBtnText: '清除点',
                nextBtnText: '下一题 & 累计总分', ruleText: '📖 圆周角定理：同弧所对圆周角 = 圆心角的一半。弦分圆为两弧，取劣弧上的圆周角 (0°~90°)。目标角度0°~90°，你的弦得到的劣弧圆周角越接近目标，得分越高！(满分100，差值每1°扣2分)',
                feedbackInit: '💡 点击圆上两点，确定弦 → 自动计算劣弧圆周角，与目标对比得分！',
                feedbackTimeout: '⏰ 时间到！未作答，本题得0分，自动进入下一题。',
                feedbackAutoNext: '⏩ 已作答，自动进入下一题...',
                feedbackFirstPoint: (x,y,target) => `📍 已选第一个点 (${Math.round(x)}, ${Math.round(y)})，再点击圆上另一点确定弦。 (目标 ${target}°)`,
                feedbackSecondPoint: '🎯 第二个点已选！计算劣弧所对圆周角中...',
                feedbackWrongPos: '⚠️ 点击位置不在圆周上！请点击圆的边界附近。',
                feedbackCoincide: '⚠️ 两点重合！请重新选择两个不同的圆上点。',
                feedbackReset: (target) => `✨ 新回合！目标角度更新为 ${target.toFixed(1)}° 。点击圆上两点，获得劣弧圆周角并赚取分数！本轮得分将计入总分。`,
                feedbackClear: (target) => `🗑️ 已清除两个点。重新点击圆上两点挑战当前目标角度 ${target.toFixed(1)}°。`,
                feedbackScoreDetail: (arc, target, diff, score, perfect) => `🎉 弦所对劣弧圆周角 = ${arc.toFixed(1)}°  |  目标 ${target.toFixed(1)}°  差值 = ${diff.toFixed(1)}° → 得分 ${score} 分！ ${perfect}`,
                perfectStr: '🎯完美！', goodStr: '👍很不错！', tryStr: '💪再试试调整弦！'
            },
            en: {
                targetLabel: 'Target Angle', totalLabel: 'Total', roundLabel: 'Round Score',
                arcLabel: '📐 Inscribed angle (minor arc)', timerLabel: 'Time Left', clearBtnText: 'Clear Points',
                nextBtnText: 'Next & Add Score', ruleText: '📖 Inscribed Angle Theorem: angle = 1/2 × central angle. Chord splits circle, we use minor arc angle (0°~90°). Closer to target → higher score! (Max 100, -2 per 1° difference)',
                feedbackInit: '💡 Click two points on the circle → compute inscribed angle of minor arc, compare with target!',
                feedbackTimeout: '⏰ Time out! No answer, 0 points. Auto next round.',
                feedbackAutoNext: '⏩ Already answered, auto advancing...',
                feedbackFirstPoint: (x,y,target) => `📍 First point selected (${Math.round(x)}, ${Math.round(y)}). Click another point on circle. (Target ${target}°)`,
                feedbackSecondPoint: '🎯 Second point selected! Computing inscribed angle of minor arc...',
                feedbackWrongPos: '⚠️ Click not on circle! Please click near circumference.',
                feedbackCoincide: '⚠️ Points overlap! Choose two distinct points.',
                feedbackReset: (target) => `✨ New Round! Target angle updated to ${target.toFixed(1)}°. Click two points on circle to earn score!`,
                feedbackClear: (target) => `🗑️ Points cleared. Challenge current target ${target.toFixed(1)}° again.`,
                feedbackScoreDetail: (arc, target, diff, score, perfect) => `🎉 Inscribed angle = ${arc.toFixed(1)}°  |  Target ${target.toFixed(1)}°  Diff = ${diff.toFixed(1)}° → Score ${score} pts! ${perfect}`,
                perfectStr: '🎯Perfect!', goodStr: '👍Great!', tryStr: '💪Try another chord!'
            }
        };
        
        // DOM 元素引用
        const targetAngleSpan = document.getElementById('targetAngle');
        const totalScoreSpan = document.getElementById('totalScore');
        const roundScoreSpan = document.getElementById('roundScore');
        const computedAngleSpan = document.getElementById('computedAngle');
        const feedbackMsgDiv = document.getElementById('feedbackMsg');
        const timerSecondsSpan = document.getElementById('timerSeconds');
        const clearPointsBtn = document.getElementById('clearPointsBtn');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const langSelect = document.getElementById('langSelect');
        const fontMinus = document.getElementById('fontMinus');
        const fontPlus = document.getElementById('fontPlus');
        
        // 多语言动态更新
        function updateTexts() {
            const t = translations[currentLang];
            document.getElementById('targetLabel').innerText = t.targetLabel;
            document.getElementById('totalLabel').innerText = t.totalLabel;
            document.getElementById('roundLabel').innerText = t.roundLabel;
            document.getElementById('arcLabel').innerHTML = t.arcLabel;
            document.getElementById('timerLabel').innerText = t.timerLabel;
            document.getElementById('clearBtnText').innerText = t.clearBtnText;
            document.getElementById('nextBtnText').innerHTML = t.nextBtnText;
            document.getElementById('ruleText').innerHTML = t.ruleText;
            // 若反馈消息未处于特殊状态，则刷新通用占位
            if (!feedbackMsgDiv.innerHTML.includes('🎉') && !feedbackMsgDiv.innerHTML.includes('Time out') && !feedbackMsgDiv.innerHTML.includes('时间到')) {
                if(pointA === null && pointB === null) feedbackMsgDiv.innerHTML = t.feedbackInit;
                else if(pointA && !pointB) feedbackMsgDiv.innerHTML = t.feedbackFirstPoint(pointA.x, pointA.y, targetAngle);
                else if(pointA && pointB) feedbackMsgDiv.innerHTML = t.feedbackScoreDetail(lastComputedArcAngle||0, targetAngle, Math.abs((lastComputedArcAngle||0)-targetAngle), currentRoundScore, '');
                else feedbackMsgDiv.innerHTML = t.feedbackInit;
            }
        }
        
        // 字体大小调整 (作用于容器)
        function setBaseFontSize(delta) {
            const container = document.querySelector('.game-container');
            let current = parseFloat(getComputedStyle(container).fontSize) || 16;
            let newSize = current + delta;
            if (newSize >= 12 && newSize <= 28) {
                container.style.fontSize = newSize + 'px';
                // 同时调整canvas内文字不受影响，但canvas内文字独立, 无伤大雅
            }
        }
        
        // ---------- 核心几何计算 ----------
        function getAngleFromCenter(px, py) {
            return Math.atan2(py - center.y, px - center.x);
        }
        
        // 计算劣弧圆周角 (度数)
        function computeMinorArcAngle(pA, pB) {
            if (!pA || !pB) return null;
            let angA = getAngleFromCenter(pA.x, pA.y);
            let angB = getAngleFromCenter(pB.x, pB.y);
            let delta = Math.abs(angA - angB);
            let minorCentralRad = Math.min(delta, 2 * Math.PI - delta);
            let minorCentralDeg = minorCentralRad * 180 / Math.PI;
            if (minorCentralDeg === 0) return null;
            let inscribed = minorCentralDeg / 2;
            return Math.min(90, Math.max(0, inscribed));
        }
        
        function computeScoreFromArc(arcAngle) {
            if (arcAngle === null) return 0;
            let diff = Math.abs(arcAngle - targetAngle);
            let score = Math.max(0, 100 - diff * 2);
            return Math.floor(score);
        }
        
        // 停止倒计时
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        // 开始倒计时 (重置15秒，启动)
        function startTimer() {
            stopTimer();
            timeLeft = 15;
            timerSecondsSpan.innerText = timeLeft;
            isAnswered = false;
            roundActive = true;
            timerInterval = setInterval(() => {
                if (!roundActive) return; // 已结束
                if (timeLeft <= 1) {
                    // 倒计时结束未作答
                    if (!isAnswered && roundActive) {
                        // 未作答，得0分，自动下一题
                        clearTimerAndFinish(false);
                        // 自动进入下一题
                        autoNextDueToTimeout();
                    } else {
                        stopTimer();
                    }
                } else {
                    timeLeft--;
                    timerSecondsSpan.innerText = timeLeft;
                }
            }, 1000);
        }
        
        // 倒计时结束或已经作答后的清理，并强制锁定得分
        function clearTimerAndFinish(hasAnswered) {
            if (!roundActive) return;
            roundActive = false;
            stopTimer();
            if (!hasAnswered && !isAnswered) {
                // 未作答，得0分
                currentRoundScore = 0;
                lastComputedArcAngle = null;
                updateUI();
                const t = translations[currentLang];
                feedbackMsgDiv.innerHTML = t.feedbackTimeout;
                // 锁定状态，不允许再选点
                pointA = null; pointB = null;
                drawCanvas();
                isAnswered = true;
            }
        }
        
        // 自动切换下一题 (由倒计时触发)
        function autoNextDueToTimeout() {
            if (!roundActive && !isAnswered) isAnswered = true; 
            // 累加总分（已经0分）
            totalPoints += currentRoundScore;
            generateNewRound(true);
        }
        
        // 手动或自动开始新回合
        function generateNewRound(isAuto = false) {
            // 清除当前计时，重置状态
            stopTimer();
            // 生成新目标角度
            const newTarget = Math.floor(Math.random() * 901) / 10;
            targetAngle = newTarget;
            // 重置点与分数
            pointA = null;
            pointB = null;
            lastComputedArcAngle = null;
            currentRoundScore = 0;
            isAnswered = false;
            roundActive = true;
            updateUI();
            drawCanvas();
            // 启动倒计时
            startTimer();
            const t = translations[currentLang];
            if (!isAuto) {
                feedbackMsgDiv.innerHTML = t.feedbackReset(targetAngle);
            } else {
                feedbackMsgDiv.innerHTML = t.feedbackReset(targetAngle) + (currentLang==='zh'?' 新回合开始！':' New round start!');
            }
        }
        
        // 处理玩家作答（两点确定后调用）
        function processAnswer() {
            if (!roundActive || isAnswered) return;
            if (!pointA || !pointB) return;
            // 检查重合
            const dx = pointA.x - pointB.x;
            const dy = pointA.y - pointB.y;
            if (Math.hypot(dx, dy) < 3) {
                const t = translations[currentLang];
                feedbackMsgDiv.innerHTML = t.feedbackCoincide;
                return;
            }
            let arc = computeMinorArcAngle(pointA, pointB);
            if (arc === null) return;
            lastComputedArcAngle = arc;
            let score = computeScoreFromArc(arc);
            currentRoundScore = score;
            isAnswered = true;
            roundActive = false;
            stopTimer();
            // 显示得分详情
            const diff = Math.abs(arc - targetAngle);
            const t = translations[currentLang];
            let perfectMsg = '';
            if (score === 100) perfectMsg = t.perfectStr;
            else if (score >= 80) perfectMsg = t.goodStr;
            else perfectMsg = t.tryStr;
            feedbackMsgDiv.innerHTML = t.feedbackScoreDetail(arc, targetAngle, diff, score, perfectMsg);
            updateUI();
            drawCanvas();
            // 自动进入下一题（延迟1.2秒，让玩家看到得分）
            setTimeout(() => {
                if (!roundActive && isAnswered) {
                    totalPoints += currentRoundScore;
                    generateNewRound(false);
                }
            }, 1200);
        }
        
        // 清除点 (手动清除)
        function clearPoints() {
            if (!roundActive) return;
            pointA = null;
            pointB = null;
            lastComputedArcAngle = null;
            currentRoundScore = 0;
            updateUI();
            drawCanvas();
            const t = translations[currentLang];
            feedbackMsgDiv.innerHTML = t.feedbackClear(targetAngle);
        }
        
        // 下一题按钮逻辑: 强制提交当前轮得分并进入下一轮（如果未作答，则直接0分累加）
        function forceNextRound() {
            if (!roundActive && isAnswered) {
                // 已经作答过了等待自动跳转，避免重复累加
                return;
            }
            if (roundActive) {
                // 如果还未作答，强制结束本题，得0分
                if (!isAnswered) {
                    clearTimerAndFinish(false);
                }
                totalPoints += currentRoundScore;
                generateNewRound(false);
            } else {
                // 已经是非活跃，可能是已经答完等自动跳转，防误触
                if (!isAnswered) totalPoints += currentRoundScore;
                generateNewRound(false);
            }
        }
        
        // ---------- Canvas 绘制 ----------
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 网格背景
            ctx.strokeStyle = "#d9cba3";
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            // 坐标轴
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.moveTo(0, canvas.height/2);
            ctx.lineTo(canvas.width, canvas.height/2);
            ctx.strokeStyle = "#bcab7a";
            ctx.stroke();
            // 圆
            ctx.beginPath();
            ctx.arc(center.x, center.y, radius, 0, 2*Math.PI);
            ctx.fillStyle = "rgba(255, 235, 190, 0.25)";
            ctx.fill();
            ctx.strokeStyle = "#e67e22";
            ctx.lineWidth = 3;
            ctx.stroke();
            // 圆心
            ctx.beginPath();
            ctx.arc(center.x, center.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = "#c0392b";
            ctx.fill();
            ctx.fillStyle = "#1e2a1f";
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillText("O", center.x-8, center.y-6);
            // 半径虚线
            ctx.beginPath();
            ctx.moveTo(center.x, center.y);
            ctx.lineTo(center.x+radius, center.y);
            ctx.strokeStyle = "#e67e22";
            ctx.setLineDash([6,8]);
            ctx.stroke();
            ctx.setLineDash([]);
            // 点A/B
            if (pointA) {
                ctx.beginPath();
                ctx.arc(pointA.x, pointA.y, 7, 0, 2*Math.PI);
                ctx.fillStyle = "#2c6e9e";
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillText("A", pointA.x-5, pointA.y-5);
            }
            if (pointB) {
                ctx.beginPath();
                ctx.arc(pointB.x, pointB.y, 7, 0, 2*Math.PI);
                ctx.fillStyle = "#2c6e9e";
                ctx.fill();
                ctx.fillText("B", pointB.x-5, pointB.y-5);
            }
            if (pointA && pointB) {
                ctx.beginPath();
                ctx.moveTo(pointA.x, pointA.y);
                ctx.lineTo(pointB.x, pointB.y);
                ctx.strokeStyle = "#d35400";
                ctx.lineWidth = 3;
                ctx.stroke();
                // 劣弧示意虚线
                let angA = getAngleFromCenter(pointA.x, pointA.y);
                let angB = getAngleFromCenter(pointB.x, pointB.y);
                let delta = Math.abs(angA - angB);
                let start = angA, end = angB;
                if (delta > Math.PI) { let temp=start; start=end; end=temp; delta=2*Math.PI-delta; }
                if (start > end) { let t=start; start=end; end=t; }
                ctx.beginPath();
                ctx.arc(center.x, center.y, radius+5, start, end);
                ctx.strokeStyle = "#ffaa55";
                ctx.setLineDash([8,12]);
                ctx.stroke();
                ctx.setLineDash([]);
                if (lastComputedArcAngle) {
                    ctx.fillStyle = "#b64926";
                    ctx.font = "bold 14px 'Segoe UI'";
                    ctx.fillText(`∠ = ${lastComputedArcAngle.toFixed(1)}°`, center.x-75, center.y-radius-8);
                }
            }
            ctx.fillStyle = "#5c3b1f";
            ctx.font = "500 13px 'Segoe UI'";
            ctx.fillText(`🎯 Target: ${targetAngle.toFixed(1)}°`, center.x+radius-105, center.y-radius+18);
        }
        
        // UI更新
        function updateUI() {
            targetAngleSpan.innerText = targetAngle.toFixed(1);
            totalScoreSpan.innerText = totalPoints;
            roundScoreSpan.innerText = currentRoundScore;
            computedAngleSpan.innerText = (lastComputedArcAngle !== null) ? lastComputedArcAngle.toFixed(1) : '—';
        }
        
        // ---------- 圆上点击交互 ----------
        function isOnCircle(px, py, tol=12) {
            return Math.abs(Math.hypot(px-center.x, py-center.y)-radius) <= tol;
        }
        function snapToCircle(px, py) {
            const dx = px-center.x, dy = py-center.y;
            const dist = Math.hypot(dx, dy);
            if (dist===0) return {x:center.x+radius, y:center.y};
            const ratio = radius/dist;
            return {x:center.x+dx*ratio, y:center.y+dy*ratio};
        }
        
        function handleCanvasClick(e) {
            if (!roundActive || isAnswered) {
                const t = translations[currentLang];
                feedbackMsgDiv.innerHTML = (currentLang==='zh'?'本轮已结束，请等待下一题或点击下一题按钮':'Round finished, wait for next or click Next');
                return;
            }
            let cx, cy;
            if (e.touches) { e.preventDefault(); cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
            let canvasX = (cx-rect.left)*scaleX, canvasY = (cy-rect.top)*scaleY;
            if (!isOnCircle(canvasX, canvasY, 15)) {
                feedbackMsgDiv.innerHTML = translations[currentLang].feedbackWrongPos;
                return;
            }
            const precise = snapToCircle(canvasX, canvasY);
            if (!pointA) { pointA = precise; drawCanvas(); feedbackMsgDiv.innerHTML = translations[currentLang].feedbackFirstPoint(precise.x, precise.y, targetAngle); }
            else if (pointA && !pointB) {
                if (Math.hypot(pointA.x-precise.x, pointA.y-precise.y) < 5) { feedbackMsgDiv.innerHTML = translations[currentLang].feedbackCoincide; return; }
                pointB = precise;
                drawCanvas();
                feedbackMsgDiv.innerHTML = translations[currentLang].feedbackSecondPoint;
                processAnswer();
            } else if (pointA && pointB) {
                // 已有两点，重置后重新选第一个点
                pointA = precise;
                pointB = null;
                drawCanvas();
                feedbackMsgDiv.innerHTML = translations[currentLang].feedbackFirstPoint(precise.x, precise.y, targetAngle);
            }
        }
        
        // 事件绑定
        function bindEvents() {
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleCanvasClick(e); });
            clearPointsBtn.addEventListener('click', clearPoints);
            nextRoundBtn.addEventListener('click', forceNextRound);
            langSelect.addEventListener('change', (e)=>{
                currentLang = e.target.value;
                updateTexts();
            });
            fontMinus.addEventListener('click', ()=>setBaseFontSize(-1));
            fontPlus.addEventListener('click', ()=>setBaseFontSize(1));
        }
        
        // 初始化
        function init() {
            currentLang = 'zh';
            langSelect.value = 'zh';
            totalPoints = 0;
            targetAngle = 45.0;
            pointA = null; pointB = null;
            lastComputedArcAngle = null;
            currentRoundScore = 0;
            updateUI();
            drawCanvas();
            updateTexts();
            startTimer();
            feedbackMsgDiv.innerHTML = translations.zh.feedbackInit;
            roundActive = true;
            isAnswered = false;
        }
        
        bindEvents();
        init();
    })();
</script>
</body>
</html>
